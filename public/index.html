<!DOCTYPE html>
<html lang="de">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />
    <meta name="theme-color" content="#080808" />
    <meta name="description" content="HalalFit Deutschland — Alle halal-zertifizierten Supplements auf einen Blick. ESN, More Nutrition, VOW Nutrition und mehr." />

    <!-- SEO -->
    <meta property="og:title" content="HalalFit Deutschland" />
    <meta property="og:description" content="Die erste Halal Supplement App für Deutschland. Finde ESN, MyProtein, VOW und mehr — alle halal zertifiziert." />
    <meta property="og:type" content="website" />

    <!-- PWA -->
    <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />
    <link rel="apple-touch-icon" href="%PUBLIC_URL%/icon-192.png" />

    <!-- Fonts preload -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <title>HalalFit Deutschland ☪️</title>

    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }
      body { background: #080808; margin: 0; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; -webkit-font-smoothing: antialiased; }
      #root { min-height: 100vh; }
      ::-webkit-scrollbar { width: 4px; height: 4px; }
      ::-webkit-scrollbar-track { background: #0a0a0a; }
      ::-webkit-scrollbar-thumb { background: #333; border-radius: 4px; }
      ::-webkit-scrollbar-thumb:hover { background: #C8A96E; }
      input[type=range] { -webkit-appearance: none; height: 4px; border-radius: 2px; background: #222; outline: none; }
      input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; width: 16px; height: 16px; border-radius: 50%; background: #C8A96E; cursor: pointer; }
      select option { background: #111; color: #ccc; }
    </style>
  </head>
  <body>
    <noscript>Du brauchst JavaScript um HalalFit zu nutzen.</noscript>
    <div id="root"></div>
  </body>
</html>
